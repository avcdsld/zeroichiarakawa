    <style>
      :root {
        --ink: #ece8df;
        --dim: #b3b0a6;
        --faint: #6f6e67;
        --bg: #060608;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--bg);
        overflow: hidden;
        color: var(--ink);
        font-family: 'Hiragino Mincho ProN', 'Yu Mincho', 'Noto Serif JP', serif;
        -webkit-user-select: none;
        user-select: none;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }
      #bar {
        position: fixed;
        top: 0;
        left: 0;
        height: 1px;
        background: rgba(236, 232, 223, 0.28);
        width: 0;
        z-index: 50;
        transition: width 1.1s cubic-bezier(0.4, 0, 0.2, 1);
      }
      #stage {
        position: fixed;
        inset: 0;
      }
      .page {
        position: absolute;
        inset: 0;
        opacity: 0;
        transition: opacity 0.72s cubic-bezier(0.4, 0, 0.2, 1);
        will-change: opacity;
      }
      .page.is-active {
        opacity: 1;
      }
      .center {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 10vw;
        height: 100%;
      }
      .center h1 {
        font-weight: 500;
        font-size: clamp(26px, 5.6vw, 52px);
        letter-spacing: 0.16em;
        line-height: 1.9;
        margin: 0;
        opacity: 0;
      }
      .center .prose {
        max-width: 30em;
        font-size: clamp(16px, 2.5vw, 22px);
        line-height: 2.5;
        letter-spacing: 0.085em;
        color: var(--ink);
        opacity: 0;
        transform: translateY(10px);
        transition: opacity 0.95s ease 0.16s,
          transform 1.05s cubic-bezier(0.2, 0.7, 0.2, 1) 0.16s;
      }
      .vitrine {
        position: absolute;
        inset: 0;
        background: #000;
      }
      .vitrine iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
        pointer-events: none;
      }
      .scrim {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 48%;
        pointer-events: none;
        background: linear-gradient(
          to top,
          rgba(4, 4, 6, 0.9) 4%,
          rgba(4, 4, 6, 0.55) 40%,
          rgba(4, 4, 6, 0) 100%
        );
        opacity: 0;
        transition: opacity 0.9s ease 0.3s;
      }
      .words {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 9vh;
        padding: 0 9vw;
        pointer-events: none;
        opacity: 0;
        transform: translateY(12px);
        transition: opacity 0.95s ease 0.42s,
          transform 1.05s cubic-bezier(0.2, 0.7, 0.2, 1) 0.42s;
      }
      .words .cap {
        font-size: clamp(20px, 3.4vw, 32px);
        letter-spacing: 0.12em;
        line-height: 1.65;
        color: var(--ink);
      }
      .words .narr {
        margin-top: 18px;
        font-size: clamp(13px, 1.8vw, 16.5px);
        line-height: 2.15;
        letter-spacing: 0.06em;
        color: var(--dim);
        max-width: 34em;
      }
      .words .cap,
      .words .narr,
      .center .prose,
      .center h1,
      .center .colophon {
        -webkit-user-select: text;
        user-select: text;
        cursor: text;
        pointer-events: auto;
      }
      .center .colophon {
        font-size: clamp(13px, 1.9vw, 16px);
        letter-spacing: 0.42em;
        color: var(--dim);
        opacity: 0;
        transition: opacity 1.1s ease 0.3s;
      }
      .page.is-active .colophon {
        opacity: 1;
      }
      #restart {
        position: fixed;
        left: 50%;
        bottom: 7vh;
        transform: translateX(-50%);
        z-index: 45;
        display: none;
        cursor: pointer;
        color: var(--dim);
        font-size: clamp(12px, 1.8vw, 15px);
        letter-spacing: 0.3em;
        padding: 10px 8px;
        opacity: 0.5;
        transition: opacity 0.4s ease;
        -webkit-tap-highlight-color: transparent;
      }
      #restart:hover {
        opacity: 0.95;
      }
      html[lang='en'] body {
        font-family: 'Iowan Old Style', 'Hoefler Text', 'Palatino Linotype',
          Georgia, 'Times New Roman', serif;
      }
      html[lang='en'] .center h1 {
        letter-spacing: 0.045em;
      }
      html[lang='en'] .words .cap {
        letter-spacing: 0.015em;
      }
      html[lang='en'] .words .narr,
      html[lang='en'] .center .prose {
        letter-spacing: 0.008em;
      }
      html[lang='en'] #restart {
        letter-spacing: 0.18em;
      }
      html[lang='en'] .center .colophon {
        letter-spacing: 0.2em;
      }
      .page.is-active .scrim {
        opacity: 1;
      }
      .page.is-active .words {
        opacity: 1;
        transform: none;
      }
      .page.is-active .prose {
        opacity: 1;
        transform: none;
      }
      .page.is-active h1 {
        animation: coverSettle 1.5s cubic-bezier(0.2, 0.7, 0.2, 1) both;
      }
      @keyframes coverSettle {
        from {
          letter-spacing: 0.34em;
          opacity: 0;
        }
        to {
          letter-spacing: 0.16em;
          opacity: 1;
        }
      }
      .nav {
        position: fixed;
        top: 50%;
        transform: translateY(-50%);
        z-index: 40;
        width: 64px;
        height: 64px;
        display: grid;
        place-items: center;
        color: var(--ink);
        font-size: 26px;
        line-height: 1;
        cursor: pointer;
        opacity: 0.26;
        background: none;
        border: 0;
        text-shadow: 0 1px 14px rgba(0, 0, 0, 0.6);
        transition: opacity 0.4s ease;
        -webkit-tap-highlight-color: transparent;
      }
      .nav:hover {
        opacity: 0.8;
      }
      #prev {
        left: 8px;
      }
      #next {
        right: 8px;
      }
      @media (max-width: 820px) {
        .words {
          bottom: 7.5vh;
          padding: 0 7vw;
        }
        .center .prose {
          line-height: 2.25;
        }
        .nav {
          width: 56px;
          height: 56px;
          font-size: 24px;
          opacity: 0.4;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #bar {
          transition: none;
        }
        .page {
          transition: opacity 0.2s linear;
        }
        .scrim,
        .words,
        .center .prose {
          transition: none;
          transform: none;
          opacity: 1;
        }
        .center h1 {
          animation: none;
          opacity: 1;
        }
      }
    </style>

      };

      const stage = document.getElementById('stage');
      const bar = document.getElementById('bar');
      const prevB = document.getElementById('prev');
      const nextB = document.getElementById('next');
      const restartB = document.getElementById('restart');

      const FADE = 720;
      const cache = new Map();
      let idx = -1,
        busy = false;

      function b64html(b64) {
        const bin = atob(b64);
        const u = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) u[i] = bin.charCodeAt(i);
        return new TextDecoder('utf-8').decode(u);
      }
      function br(s) {
        return (s || '').replace(/\n/g, '<br>');
      }

      function buildNode(i) {
        const p = PAGES[i];
        const page = document.createElement('div');
        page.className = 'page';
        if (p.kind === 'art') {
          const vit = document.createElement('div');
          vit.className = 'vitrine';
          const sc = document.createElement('div');
          sc.className = 'scrim';
          vit.appendChild(sc);
          const w = document.createElement('div');
          w.className = 'words';
          let html = '';
          if (p.cap) html += '<div class="cap">' + br(p.cap) + '</div>';
          html += '<div class="narr">' + br(p.body) + '</div>';
          w.innerHTML = html;
          vit.appendChild(w);
          page.appendChild(vit);
          page._art = p.art;
          page._cap = p.cap || '';
          page._vit = vit; // iframe mounted on demand
        } else {
          const c = document.createElement('div');
          c.className = 'center';
          if (p.kind === 'cover') c.innerHTML = '<h1>' + br(p.title) + '</h1>';
          else if (p.kind === 'colophon')
            c.innerHTML = '<div class="colophon">' + br(p.date) + '</div>';
          else if (p.body)
            c.innerHTML = '<div class="prose">' + br(p.body) + '</div>';
          page.appendChild(c);
        }
        page.style.display = 'none';
        stage.appendChild(page);
        cache.set(i, page);
        return page;
      }
      function nodeFor(i) {
        return cache.get(i) || buildNode(i);
      }

      // Only the active art keeps a live WebGL context; offscreen scenes are torn
      // down (and rebuilt on revisit) so the GPU never runs all of them at once.
      function mountArt(page) {
        if (!page || !page._art || page._frame) return;
        const f = document.createElement('iframe');
        f.setAttribute('scrolling', 'no');
        f.setAttribute('title', page._cap);
        const blob = new Blob([b64html(ART[page._art])], { type: 'text/html' });
        f.src = URL.createObjectURL(blob);
        f.addEventListener('load', () => URL.revokeObjectURL(f.src));
        page._vit.insertBefore(f, page._vit.firstChild);
        page._frame = f;
      }
      function unmountArt(page) {
        if (page && page._frame) {
          try {
            page._frame.src = 'about:blank';
          } catch (e) {}
          page._frame.remove();
          page._frame = null;
        }
      }

      function arrows() {
        const last = idx >= PAGES.length - 1;
        prevB.style.display = idx <= 0 ? 'none' : '';
        nextB.style.display = last ? 'none' : '';
        restartB.style.display = last ? 'block' : 'none';
      }

      function go(n) {
        const ni = Math.max(0, Math.min(PAGES.length - 1, n));
        if (ni === idx || busy) return;
        busy = true;
        const prevNode = idx >= 0 ? cache.get(idx) : null;
        const nextNode = nodeFor(ni);
        mountArt(nextNode);
        nextNode.style.display = 'block';
        nextNode.classList.remove('is-active');
        void nextNode.offsetHeight;
        if (prevNode) prevNode.classList.remove('is-active');
        idx = ni;
        bar.style.width =
          (PAGES.length > 1 ? (idx / (PAGES.length - 1)) * 100 : 100) + '%';
        arrows();
        requestAnimationFrame(() =>
          requestAnimationFrame(() => {
            nextNode.classList.add('is-active');
          }),
        );
        setTimeout(() => {
          if (prevNode && prevNode !== nextNode) {
            prevNode.style.display = 'none';
            unmountArt(prevNode);
          }
          busy = false;
        }, FADE);
      }

      prevB.onclick = () => go(idx - 1);
      nextB.onclick = () => go(idx + 1);
      restartB.onclick = () => go(0);
      restartB.textContent =
        document.documentElement.lang === 'en' ? 'Begin again' : 'はじめに戻る';
      window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'ArrowDown') {
          e.preventDefault();
          go(idx + 1);
        } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
          e.preventDefault();
          go(idx - 1);
        }
      });
      let sx = 0,
        sy = 0;
      window.addEventListener(
        'touchstart',
        (e) => {
          sx = e.touches[0].clientX;
          sy = e.touches[0].clientY;
        },
        { passive: true },
      );
      window.addEventListener(
        'touchend',
        (e) => {
          const dx = e.changedTouches[0].clientX - sx,
            dy = e.changedTouches[0].clientY - sy;
          if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy))
            go(idx + (dx < 0 ? 1 : -1));
        },
        { passive: true },
      );

      go(0);
    </script>
